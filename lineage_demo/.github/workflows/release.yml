name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --dev
      - name: Test
        run: uv run pytest tests
      - name: Wheel matrix
        run: scripts/uv_test_matrix.sh
      - name: Build distributions
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi-publish:
    name: publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
